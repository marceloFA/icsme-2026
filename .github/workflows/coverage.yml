name: Tests & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage-badge

    - name: Run tests with coverage
      run: |
        pytest --cov=collection --cov=eda --cov-report=term --cov-report=xml --cov-report=html -v
      continue-on-error: true

    - name: Generate coverage badge
      run: |
        coverage-badge -o coverage.svg -f

    - name: Display coverage in summary
      run: |
        coverage report >> $GITHUB_STEP_SUMMARY

    - name: Commit coverage badge (main branch only)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add coverage.svg
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update coverage badge" && git push)
      continue-on-error: true

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('coverage.svg', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Test Coverage\n![Coverage](./coverage.svg)`
          });
      continue-on-error: true
